version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: k29photo_db
    environment:
      POSTGRES_DB: ${DB_NAME:-k29photo}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./k29photo/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./k29photo/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - k29photo_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k29photo_app
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DB_NAME=${DB_NAME:-k29photo}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    volumes:
      - ./k29photo:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - k29photo_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  k29photo_network:
    driver: bridge
